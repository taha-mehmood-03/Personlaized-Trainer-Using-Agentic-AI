name: Build & Push Backend Image

# Builds the FastAPI backend Docker image and pushes it to Docker Hub.
# (The Next.js frontend is deployed by Vercel directly — no Docker needed.)

on:
  push:
    branches: [main]
    paths:
      - 'mental_health_wellness/**'
      - '.github/workflows/docker-publish.yml'
  workflow_dispatch:   # allow manual runs from the Actions tab

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./mental_health_wellness
          file: ./mental_health_wellness/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/sentimind-backend:latest
            ${{ secrets.DOCKER_USERNAME }}/sentimind-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
